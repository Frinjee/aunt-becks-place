name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install Azure Static Web Apps CLI
        run: npm i -g @azure/static-web-apps-cli

      - name: Deploy production
        if: github.event_name == 'push'
        working-directory: ..
        run: swa deploy aunt-becks-place --deployment-token "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}" --env production --api-language node --api-version 22

      - name: Deploy pull request preview
        if: github.event_name == 'pull_request'
        working-directory: ..
        run: swa deploy aunt-becks-place --deployment-token "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}" --env "pr-${{ github.event.pull_request.number }}" --api-language node --api-version 22
